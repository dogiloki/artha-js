    <title>Prueba ArthaJS</title>

    <script type="module">
        import {XHR,EventBus,SPA,AutoSave} from './src/index.js';
        let spa=new SPA({
            menu:document.getElementById('menu'),

        const store=new AutoSave();
        store.bind(document.getElementById('nombre')).load();
