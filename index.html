        import {XHR,EventBus} from './src/index.js';

        EventBus.on('artha:before-register',()=>{
            XHR.defaults.transformResponse=(xhr)=>{

                    data:xhr.response,
                    errors:null,
                    meta:null
                };
            };
        });
