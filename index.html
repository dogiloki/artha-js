<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prueba ArthaJS</title>
    <link rel="stylesheet" href="dist/artha.min.css">
    <script type="module">
        import {XHR,EventBus} from './dist/artha.min.js';

        EventBus.on('artha:before-register',()=>{
            XHR.defaults.transformResponse=(xhr)=>{
                return {
                    data:xhr.response,
                    errors:null,
                    meta:null
                };
            };
        });
        const container=document.querySelector('artha-container');
        document.getElementById('refresh').addEventListener('click',(evt)=>{
            container.refresh();
        });
    </script>
</head>
<body>
    <artha-form
        action="https://api.mockfly.dev/mocks/b5a1a715-2d30-4f60-97ec-7114638083d9/user"
        method="POST">
        <input type="text" name="id">
        <input type="text" name="name">
        <input type="submit" value="Enviar">
    </artha-form>

    <button id="refresh">Recargar</button>
    <artha-container
        action="https://api.mockfly.dev/mocks/b5a1a715-2d30-4f60-97ec-7114638083d9/users"
        template="item-template"
        searcher>
    </artha-container>
    <template id="item-template">
        <div>
            <div data-wire="id"></div>
            <div data-wire="name"></div>
            <hr>
        </div>
    </template>
</body>
</html>
