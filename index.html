<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prueba ArthaJS</title>
    <link rel="stylesheet" href="dist/artha.min.css">
    <script type="module">
        import {XHR,EventBus} from './dist/artha.min.js';

        EventBus.on('artha:before-register',()=>{
            XHR.defaults.transformResponse=(xhr)=>{
                return {
                    status:"sucess",
                    message:"",
                    data:xhr.response,
                    errors:null,
                    meta:null
                };
            };
        });


    </script>
</head>
<body>
    <artha-container action="https://api.mockfly.dev/mocks/b5a1a715-2d30-4f60-97ec-7114638083d9/users" template="item-template" autoload="false"></artha-container>
    <template id="item-template">
        <div>
            <div data-wire="id"></div>
            <div data-wire="name"></div>
            <hr>
        </div>
    </template>
</body>
</html>
